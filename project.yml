name: HabitJourney

options:
  bundleIdPrefix: com.habitjourney
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.4"
  groupSortPosition: top
  generateEmptyDirectories: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_PREVIEWS: "YES"

targets:
  HabitJourney:
    type: application
    platform: iOS
    deploymentTarget: "16.0"

    sources:
      - path: HabitJourney
        excludes:
          - "**/*.md"

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.habitjourney.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "11"
        PRODUCT_NAME: HabitJourney
        DEVELOPMENT_TEAM: B37332G6T2
        CODE_SIGN_STYLE: Manual
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: HabitJourney/Info.plist
      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf
        Release:
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          SWIFT_OPTIMIZATION_LEVEL: "-O"

    info:
      path: HabitJourney/Info.plist
      properties:
        CFBundleName: HabitJourney
        CFBundleDisplayName: HabitJourney
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSUserNotificationsUsageDescription: >
          HabitJourney uses notifications to remind you about your daily habits and journal entries.

    entitlements:
      path: HabitJourney/HabitJourney.entitlements
      properties:
        com.apple.security.application-groups: []

schemes:
  HabitJourney:
    build:
      targets:
        HabitJourney: all
    run:
      config: Debug
    archive:
      config: Release
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
