workflows:
  ios-appstore:
    name: FORGE Habit Tracker App Store Release
    max_build_duration: 60
    environment:
      xcode: latest
      groups:
        - default
      vars:
        APP_STORE_CONNECT_ISSUER_ID: a6826daa-63d6-42be-bb34-2938edbcdb7d
        APP_STORE_CONNECT_KEY_IDENTIFIER: U2G5L4729F
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          xcodegen generate --spec project.yml

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files \
            com.habitjourney.app \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates

      - name: Set up profiles
        script: |
          xcode-project use-profiles
          xcode-project use-profiles --export-options-plist exportOptions.plist

      - name: Build and archive
        script: |
          xcodebuild \
            -project HabitJourney.xcodeproj \
            -scheme HabitJourney \
            -configuration Release \
            -archivePath HabitJourney.xcarchive \
            GENERATE_INFOPLIST_FILE=NO \
            archive

      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath HabitJourney.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath build/ipa

      - name: Upload to App Store Connect
        script: |
          cd build/ipa
          IPA_FILE=$(ls *.ipa | head -1)
          echo "Uploading $IPA_FILE..."
          xcrun altool --upload-app \
            -f "$IPA_FILE" \
            -t ios \
            --apiKey "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            2>&1 || {
            echo "altool failed, trying app-store-connect..."
            app-store-connect publish \
              --path "$IPA_FILE" \
              --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
              --issuer-id "$APP_STORE_CONNECT_ISSUER_ID"
          }

    artifacts:
      - build/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
